<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TYREX_KSH MD | WhatsApp Connector</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      animation: bodyBgShift 10s ease infinite;
    }

    @keyframes bodyBgShift {
      0% { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
      33% { background: linear-gradient(135deg, #1a0b2e, #4a1d6d, #2a1a4a); }
      66% { background: linear-gradient(135deg, #0e1a2a, #2d1b4e, #1a0f2e); }
      100% { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    }

    /* Animated background particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      50% { transform: translateY(-20px) translateX(10px); opacity: 0.8; }
    }

    /* Glassmorphism container with rainbow border */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.6s ease-out, rainbowBorderGlow 3s infinite;
    }

    @keyframes rainbowBorderGlow {
      0% { box-shadow: 0 0 10px #ff0000, 0 25px 45px rgba(0,0,0,0.2); }
      25% { box-shadow: 0 0 20px #00ff00, 0 25px 45px rgba(0,0,0,0.2); }
      50% { box-shadow: 0 0 20px #0000ff, 0 25px 45px rgba(0,0,0,0.2); }
      75% { box-shadow: 0 0 20px #ff00ff, 0 25px 45px rgba(0,0,0,0.2); }
      100% { box-shadow: 0 0 10px #ff0000, 0 25px 45px rgba(0,0,0,0.2); }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header section */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }

    /* Your logo image */
    .logo-image {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto;
      display: block;
      border: 3px solid transparent;
      animation: logoBorderRainbow 2s infinite, pulse 2s infinite;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    @keyframes logoBorderRainbow {
      0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
      25% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
      50% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
      75% { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
      100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -12px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      animation: badgeGlow 1.5s infinite;
    }

    @keyframes badgeGlow {
      0%, 100% { box-shadow: 0 0 5px #f5576c; }
      50% { box-shadow: 0 0 20px #f093fb; }
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      animation: rainbowFlow 4s linear infinite;
    }

    .subtitle {
      font-size: 13px;
      background: linear-gradient(90deg, #ff99cc, #99ff99, #99ccff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: subtitlePulse 2s ease infinite;
    }

    @keyframes subtitlePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes rainbowFlow {
      0% { background-position: 0% center; }
      100% { background-position: 400% center; }
    }

    /* Premium Toggle */
    .toggle-container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      padding: 4px;
      display: flex;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: toggleGlow 3s infinite;
    }

    @keyframes toggleGlow {
      0% { border-color: #ff0000; }
      33% { border-color: #00ff00; }
      66% { border-color: #0000ff; }
      100% { border-color: #ff0000; }
    }

    .toggle-option {
      flex: 1;
      padding: 12px 16px;
      text-align: center;
      cursor: pointer;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: rgba(255, 255, 255, 0.7);
      position: relative;
    }

    .toggle-option i {
      margin-right: 8px;
    }

    .toggle-option.active {
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
      background-size: 400% auto;
      animation: rainbowFlow 2s linear infinite;
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    /* Input group premium */
    .input-group {
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .input-group.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(90deg, #ff9999, #99ff99, #9999ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #ff00ff;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(255, 0, 255, 0.2);
      animation: inputGlow 1s infinite;
    }

    @keyframes inputGlow {
      0% { border-color: #ff0000; }
      33% { border-color: #00ff00; }
      66% { border-color: #0000ff; }
      100% { border-color: #ff0000; }
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Premium button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% auto;
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      animation: rainbowFlow 3s linear infinite;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 0, 255, 0.5);
      animation: rainbowFlow 0.5s linear infinite;
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .generate-btn.hidden {
      display: none;
    }

    /* Display cards */
    .code-display {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      animation: cardGlow 2s infinite;
    }

    @keyframes cardGlow {
      0% { border-color: #ff0000; }
      33% { border-color: #00ff00; }
      66% { border-color: #0000ff; }
      100% { border-color: #ff0000; }
    }

    /* RAINBOW ANIMATION FOR CODE */
    .code-number {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      font-family: monospace;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 12px;
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbowFlow 1.5s linear infinite;
    }

    .qr-display {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      animation: cardGlow 2s infinite;
    }

    .qr-image {
      max-width: 250px;
      max-height: 250px;
      margin: 0 auto 15px;
      border-radius: 16px;
      background: white;
      padding: 10px;
    }

    .qr-instructions {
      font-size: 12px;
      background: linear-gradient(90deg, #ff9999, #99ff99);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.6;
    }

    /* Copy button premium with rainbow */
    .copy-btn {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .copy-btn:hover {
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
      background-size: 400% 100%;
      animation: rainbowFlow 1s linear infinite;
      border-color: transparent;
      transform: scale(1.02);
    }

    /* Loading spinner */
    .loading {
      text-align: center;
      margin: 20px 0;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(102, 126, 234, 0.3);
      border-top-color: #ff00ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite, borderRainbow 1s infinite;
    }

    @keyframes borderRainbow {
      0% { border-top-color: #ff0000; }
      25% { border-top-color: #00ff00; }
      50% { border-top-color: #0000ff; }
      75% { border-top-color: #ff00ff; }
      100% { border-top-color: #ff0000; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      background: linear-gradient(90deg, #ff9999, #99ff99);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 13px;
    }

    /* Messages */
    .success-message {
      background: linear-gradient(90deg, #00ff00, #00ccff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
    }

    .error-message {
      color: #f87171;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #ff0000, #ff7700);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }
      
      .title {
        font-size: 24px;
      }
      
      .code-number {
        font-size: 22px;
        letter-spacing: 3px;
      }
      
      .logo-image {
        width: 75px;
        height: 75px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="header">
      <div class="logo-wrapper">
        <!-- Your Logo Image -->
        <img src="https://i.ibb.co/0przShNX/Tyrex-Ksh-Tech.jpg" alt="TYREX_KSH Logo" class="logo-image">
        <div class="badge">TYREX</div>
      </div>
      <h1 class="title">TYREX_KSH MD</h1>
      <p class="subtitle">WhatsApp Connector • 2026</p>
    </div>

    <!-- Premium Toggle -->
    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-group" id="inputGroup">
      <label class="input-label">
        <i class="fas fa-phone-alt"></i> WhatsApp Number
      </label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="255712345678" autocomplete="off">
      <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 8px; text-align: center;">
        <i class="fas fa-info-circle"></i> Enter with country code (e.g., 255712345678)
      </div>
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Processing secure connection...</div>
    </div>

    <!-- Code Display -->
    <div class="code-display" id="codeDisplay">
      <div style="color: rgba(255,255,255,0.5); font-size: 13px;">
        <i class="fas fa-clock"></i> Ready to connect
      </div>
    </div>

    <!-- QR Display -->
    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions"></div>
    </div>

    <button class="copy-btn" id="copy">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <div class="stats">
        <div class="stat">
          <div class="stat-value">⚡ 99.9%</div>
          <div class="stat-label">Uptime</div>
        </div>
        <div class="stat">
          <div class="stat-value">🔒 AES-256</div>
          <div class="stat-label">Encryption</div>
        </div>
        <div class="stat">
          <div class="stat-value">🚀 Instant</div>
          <div class="stat-label">Connection</div>
        </div>
      </div>
      <p>© 2026 TYREX_KSH MD • PRO</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    // Animated particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 6 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.animationDuration = Math.random() * 8 + 4 + 's';
        particlesContainer.appendChild(particle);
      }
    }
    createParticles();

    let currentMode = 'pair';
    let currentQRTimeout = null;

    // Toggle functionality
    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');
        currentMode = mode;

        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');
        
        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
          document.getElementById('qrDisplay').style.display = 'none';
          document.getElementById('codeDisplay').style.display = 'block';
          document.getElementById('codeDisplay').innerHTML = '<div style="color: rgba(255,255,255,0.5); font-size: 13px;"><i class="fas fa-clock"></i> Ready to connect</div>';
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          generateQRCode();
        }
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      if (currentQRTimeout) clearTimeout(currentQRTimeout);

      loadingSpinner.style.display = "block";
      codeDisplay.style.display = 'none';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios.get('/qr');
        
        if (response.data && response.data.qr) {
          document.getElementById('qrImage').src = response.data.qr;
          if (response.data.instructions) {
            document.getElementById('qrInstructions').innerHTML = response.data.instructions.join('<br>');
          } else {
            document.getElementById('qrInstructions').innerHTML = '📍 Scan with WhatsApp > Linked Devices > Link a Device';
          }
          qrDisplay.style.display = 'block';
          
          currentQRTimeout = setTimeout(() => {
            if (currentMode === 'qr') generateQRCode();
          }, 20000);
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Failed to generate QR</div>';
          codeDisplay.style.display = 'block';
        }
      } catch (error) {
        console.error("QR Error:", error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Connection error. Retrying...</div>';
        codeDisplay.style.display = 'block';
        setTimeout(() => { if (currentMode === 'qr') generateQRCode(); }, 5000);
      } finally {
        loadingSpinner.style.display = "none";
      }
    }

    document.getElementById("submit").addEventListener("click", async (e) => {
      e.preventDefault();
      
      const mobileNumberInput = document.getElementById("mobileNumber");
      const codeDisplay = document.getElementById("codeDisplay");
      const qrDisplay = document.getElementById("qrDisplay");
      const loadingSpinner = document.getElementById("loading");

      let mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        codeDisplay.style.display = 'block';
        qrDisplay.style.display = 'none';
        return;
      }

      let cleanNumber = mobileNumber.replace(/[^0-9]/g, '');
      if (cleanNumber.startsWith('0')) cleanNumber = cleanNumber.substring(1);
      
      if (cleanNumber.length < 9) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Invalid number. Use format: 255712345678</div>';
        codeDisplay.style.display = 'block';
        return;
      }

      loadingSpinner.style.display = "block";
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';
      codeDisplay.style.display = 'block';

      try {
        const response = await axios.get(`/pair?number=${cleanNumber}`);
        
        if (response.data && response.data.success !== false) {
          if (response.data.code) {
            codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> <span class="code-number" id="pairCodeText">${response.data.code}</span></div>`;
          } else if (response.data.message) {
            codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> ${response.data.message}</div>`;
          }
        } else {
          codeDisplay.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${response.data?.message || 'Failed to generate code'}</div>`;
        }
      } catch (error) {
        let errorMsg = 'Connection failed. ';
        if (error.response?.status === 503) errorMsg += 'Server busy. Retrying...';
        else if (error.response?.status === 400) errorMsg += 'Invalid number format';
        else errorMsg += 'Please try again';
        codeDisplay.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${errorMsg}</div>`;
      } finally {
        loadingSpinner.style.display = "none";
      }
    });

    // COPY FUNCTION - Automatically copies the code when clicked
    function copyCode() {
      const codeElement = document.getElementById("pairCodeText");
      
      if (codeElement) {
        const codeText = codeElement.innerText;
        
        navigator.clipboard.writeText(codeText).then(() => {
          const copyBtn = document.getElementById("copy");
          const originalHTML = copyBtn.innerHTML;
          copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Code Copied! 🎉';
          copyBtn.style.background = "linear-gradient(90deg, #00ff00, #00cc00)";
          copyBtn.style.animation = "rainbowFlow 0.5s linear infinite";
          
          setTimeout(() => {
            copyBtn.innerHTML = originalHTML;
            copyBtn.style.background = "";
            copyBtn.style.animation = "";
          }, 2000);
        }).catch(err => {
          console.error("Copy failed:", err);
          alert("Failed to copy code. Please copy manually.");
        });
      } else {
        const codeDisplay = document.getElementById("codeDisplay");
        const displayText = codeDisplay.innerText;
        const match = displayText.match(/\d{4,8}[-\d]*/);
        
        if (match) {
          navigator.clipboard.writeText(match[0]).then(() => {
            const copyBtn = document.getElementById("copy");
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Code Copied! 🎉';
            setTimeout(() => { copyBtn.innerHTML = originalHTML; }, 2000);
          });
        } else {
          alert("No code available to copy. Please generate a code first.");
        }
      }
    }

    document.getElementById("copy").addEventListener("click", copyCode);

    document.getElementById("mobileNumber").addEventListener("keypress", function(e) {
      if (e.key === "Enter" && currentMode === 'pair') {
        document.getElementById("submit").click();
      }
    });

    document.getElementById("mobileNumber").addEventListener("input", function(e) {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
  </script>
</body>
</html>
